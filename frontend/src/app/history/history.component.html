<div class="jumbotron">
  <h1 class="display-3">History</h1>
  <app-season-selector [(selectedSeasonUuid)]="selectedSeasonUuid"></app-season-selector>
</div>

@if (hasSeasons()) {
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-6">
        <h2>Ranking</h2>
        <app-players-scoreboard [seasonUuid]="selectedSeasonUuid()"></app-players-scoreboard>
      </div>
      <div class="col-md-6">
        <h2>Matches</h2>
        <app-last-matches [seasonUuid]="selectedSeasonUuid()"></app-last-matches>
      </div>
    </div>
  </div>
}
