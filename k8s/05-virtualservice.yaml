# Routes through the cluster's existing shared gateway (default/oauth-gateway),
# which already terminates TLS for the wildcard *.sdm.spoud.io - no separate
# Gateway/cert needed, same as the kafka-cost-control apps.
#
# ${HOSTNAME} is a placeholder, not a real value - see ../.env.example and
# apply.sh, which substitutes it before this file is applied.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: toeggelomat-virtualservice
  namespace: toeggelomat
spec:
  gateways:
    - default/oauth-gateway
  hosts:
    - ${HOSTNAME}
  http:
    - match:
        - uri:
            prefix: /graphql
      name: toeggelomat-backend
      route:
        - destination:
            host: toeggelomat-backend-service
            port:
              number: 8080
    - route:
        - destination:
            host: toeggelomat-frontend-service
            port:
              number: 80
