apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: toeggelomat
  labels:
    k8s-app: postgres
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      k8s-app: postgres
  template:
    metadata:
      labels:
        k8s-app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: toeggelomat-secret
                  key: POSTGRES_PASSWORD
            # Fresh EBS-backed PVCs often come with a pre-existing lost+found
            # directory, and initdb refuses to init into a non-empty mount
            # point. Point PGDATA at a subdirectory instead, per postgres's
            # own recommendation, rather than mounting the volume root directly.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: toeggelomat
  labels:
    k8s-app: postgres
spec:
  selector:
    k8s-app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
