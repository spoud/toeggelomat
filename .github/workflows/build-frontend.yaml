name: Build frontend

on:
  push:
    branches: [ main ]
    tags:
      - '*'
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'

  build:
    runs-on: ubuntu-latest
    needs: changes
    # required check must always report, so only skip the real work when this
    # is a PR that doesn't touch frontend/ - push/tag builds always run
    if: always() && (github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true')

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        working-directory: frontend/
        # TODO remove force once ngrx is released
        run: npm ci --legacy-peer-deps

      - name: Generate Graphql
        working-directory: frontend/
        run: npm run generate

      - name: Build
        working-directory: frontend/
        run: npm run build

#      - name: Lint
#        working-directory: frontend/
#        run: npm run lint

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: frontend
          path: frontend/
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend
          path: frontend/

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push latest
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: frontend/
          push: true
          tags: spoud/toeggelomat-frontend:latest

      - name: Build and push tag
        if: startsWith(github.event.ref, 'refs/tags/')
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend/
          file: backend/src/main/docker/Dockerfile.jvm
          push: true
          tags: spoud/toeggelomat-backend:${{ github.ref_name }}
